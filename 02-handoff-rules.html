<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myna 演示 - 自动交接规则</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --surface2: #f4f2ee;
      --surface3: #ebe8e2;
      --text: #1a1916;
      --text-2: #44423d;
      --text-dim: #87847d;
      --text-faint: #b8b4ab;
      --border: #e8e4dc;
      --border-strong: #d6d1c5;
      --accent: #2d6a4f;
      --accent-hover: #1f4c38;
      --accent-soft: #e8f0eb;
      --accent-glow: rgba(45, 106, 79, 0.18);
      --amber: #d97706;
      --amber-soft: #fef3e6;
      --danger: #c44545;
      --success: #2d8e5f;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(60, 50, 30, 0.04);
      --shadow: 0 2px 6px rgba(60, 50, 30, 0.06), 0 1px 2px rgba(60, 50, 30, 0.04);
      --shadow-lg: 0 8px 24px rgba(60, 50, 30, 0.08), 0 2px 6px rgba(60, 50, 30, 0.04);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .demo-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .demo-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .demo-header p {
      font-size: 16px;
      color: var(--text-dim);
    }

    .settings-panel {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      max-width: 800px;
      margin: 0 auto 40px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: var(--accent-hover);
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .setting-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      min-width: 100px;
    }

    .setting-input, .setting-select {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-sans);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .setting-input:focus, .setting-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setting-hint {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 8px;
      line-height: 1.5;
    }

    .handoff-rule {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .handoff-rule-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .handoff-rule-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
    }

    .handoff-rule-input::placeholder {
      color: var(--text-faint);
    }

    .btn-delete {
      background: var(--danger);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .hint-box {
      background: var(--accent-soft);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .hint-box svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .flow-node-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
    }
    .flow-node.active .flow-node-icon {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .flow-node-icon svg { width: 20px; height: 20px; }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--amber);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px;
      vertical-align: -4px;
    }

    /* === 协作模式动态说明卡 === */
    .mode-detail {
      margin-top: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      padding: 18px 20px;
      animation: modeFade 0.35s ease;
    }
    @keyframes modeFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mode-detail-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mode-badge {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      padding: 3px 12px;
      border-radius: 20px;
    }
    .mode-badge.guided { background: var(--accent); }
    .mode-badge.manual { background: #5b7083; }
    .mode-badge.free { background: var(--amber); }
    .mode-badge.strict { background: var(--danger); }
    .mode-tagline {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .mode-desc {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .mode-behaviors {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mode-behavior {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5;
    }
    .mode-behavior svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
    .mode-behavior.yes svg { color: var(--success); }
    .mode-behavior.no svg { color: var(--danger); }
    .mode-use {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border-strong);
      font-size: 13px;
      color: var(--text-dim);
    }
    .mode-use strong { color: var(--accent); }

    .example-flow {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
    }

    .example-flow h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .flow-diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .flow-node {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      text-align: center;
      min-width: 120px;
    }

    .flow-node.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .flow-node-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .flow-node-desc {
      font-size: 12px;
      color: var(--text-dim);
    }

    .flow-arrow {
      color: var(--accent);
      font-size: 24px;
      font-weight: 300;
    }

    .flow-trigger {
      background: var(--amber-soft);
      border: 1px solid var(--amber);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-2);
      margin-top: 16px;
    }

    .flow-trigger strong {
      color: var(--amber);
    }

    @media (max-width: 768px) {
      .demo-container {
        padding: 20px 12px;
      }

      .demo-header h1 {
        font-size: 24px;
      }

      .settings-panel, .example-flow {
        padding: 20px;
      }

      .setting-row {
        flex-direction: column;
        align-items: stretch;
      }

      .setting-label {
        min-width: auto;
      }

      .handoff-rule-row {
        flex-direction: column;
      }

      .flow-diagram {
        flex-direction: column;
      }

      .flow-arrow {
        transform: rotate(90deg);
      }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1>自动交接规则</h1>
      <p>配置智能体之间的自动协作流程</p>
    </div>

    <!-- 配置面板 -->
    <div class="settings-panel">
      <div class="section">
        <h3>协作模式</h3>
        <div class="setting-row">
          <label class="setting-label">模式</label>
          <select class="setting-select" id="modeSelect" onchange="updateMode(this.value)">
            <option value="guided" selected>引导</option>
            <option value="manual">手动</option>
            <option value="free">自由</option>
            <option value="strict">严格</option>
          </select>
        </div>
        <div class="mode-detail" id="modeDetail">
          <!-- 由 JS 动态填充 -->
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <h3>自动交接规则</h3>
          <button class="btn-add">+ 新增</button>
        </div>

        <div class="handoff-rule">
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="程序开发" placeholder="来源智能体">
            <span style="color: var(--text-dim);">→</span>
            <input class="handoff-rule-input" value="程序测试员" placeholder="目标智能体">
          </div>
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="完成, 已修复, 请测试" placeholder="触发关键词（逗号分隔）">
            <button class="btn-delete">删除</button>
          </div>
        </div>

        <div class="handoff-rule">
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="程序测试员" placeholder="来源智能体">
            <span style="color: var(--text-dim);">→</span>
            <input class="handoff-rule-input" value="程序开发" placeholder="目标智能体">
          </div>
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="发现问题, bug, 失败" placeholder="触发关键词（逗号分隔）">
            <button class="btn-delete">删除</button>
          </div>
        </div>

        <div class="handoff-rule">
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="程序测试员" placeholder="来源智能体">
            <span style="color: var(--text-dim);">→</span>
            <input class="handoff-rule-input" value="用户" placeholder="目标智能体">
          </div>
          <div class="handoff-rule-row">
            <input class="handoff-rule-input" value="已就绪, 可以上线, 测试通过" placeholder="触发关键词（逗号分隔）">
            <button class="btn-delete">删除</button>
          </div>
        </div>

        <div class="hint-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
          <span>如果不填关键词，则该来源智能体每次完成回复都会交接给目标智能体</span>
        </div>
      </div>
    </div>

    <!-- 效果演示 -->
    <div class="example-flow">
      <h3>实际运行效果</h3>
      
      <div class="flow-diagram">
        <div class="flow-node active">
          <div class="flow-node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div class="flow-node-title">用户</div>
          <div class="flow-node-desc">发起需求</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node active">
          <div class="flow-node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div>
          <div class="flow-node-title">程序开发</div>
          <div class="flow-node-desc">实现功能</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node active">
          <div class="flow-node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg></div>
          <div class="flow-node-title">程序测试员</div>
          <div class="flow-node-desc">测试验证</div>
        </div>
      </div>

      <div class="flow-trigger">
        <strong>自动触发逻辑：</strong><br><br>
        <span class="step-num">1</span> 开发回复包含"完成"/"已修复" → 自动 @程序测试员<br>
        <span class="step-num">2</span> 测试员回复包含"发现问题"/"bug" → 自动 @程序开发<br>
        <span class="step-num">3</span> 测试员回复包含"已就绪"/"测试通过" → 自动 @用户<br><br>
        <strong>全程无需手动 @，智能体自动接力</strong>
      </div>
    </div>
  </div>

  <script>
    const ICON_YES = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    const ICON_NO  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>';

    const MODES = {
      guided: {
        label: '引导',
        tagline: '推荐默认 · 自动接力 + 防废话',
        desc: '智能体之间可以主动交接任务，系统在后台做「智能裁剪」：保留真正的工作交接，自动抑制感谢、客套、重复总结、无意义的反复 @ 这类会拖垮上下文的循环。既能自动协作，又不会陷入「你好我好大家好」的死循环。',
        behaviors: [
          ['yes', '允许智能体主动 @ 下一个协作者'],
          ['yes', '命中交接规则时自动触发接力'],
          ['no', '抑制纯感谢 / 客套 / 重复总结的发言'],
          ['no', '阻止两个智能体互相反复 @ 的死循环'],
        ],
        use: '日常协作首选。开发→测试→修复这类标准流水线用它最省心。',
      },
      manual: {
        label: '手动',
        tagline: '全程由你掌控 · 不自动接力',
        desc: '关闭所有自动交接。智能体只回复当前这一轮，绝不会主动 @ 别人。需要谁干活，由你手动 @ 指定。适合你想一步一步盯着、每个环节都自己点头的场景。',
        behaviors: [
          ['no', '不会自动 @ 任何其他智能体'],
          ['no', '交接规则不生效（仅作记录）'],
          ['yes', '只有你手动 @ 才会唤起对应智能体'],
          ['yes', '每一步都在你的控制之下'],
        ],
        use: '调试单个智能体、或任务敏感需要逐步确认时使用。',
      },
      free: {
        label: '自由',
        tagline: '最大自主 · 不做任何裁剪',
        desc: '智能体之间完全放开，想接力就接力，系统不抑制任何发言。感谢、总结、寒暄都会原样保留。协作最活跃，但上下文消耗也最快，偶尔会出现客套循环。',
        behaviors: [
          ['yes', '允许智能体自由主动交接'],
          ['yes', '所有发言原样保留，不做裁剪'],
          ['no', '不抑制感谢 / 总结 / 重复 @'],
          ['no', '可能出现客套循环，消耗较快'],
        ],
        use: '头脑风暴、多智能体自由讨论、想看完整对话过程时使用。',
      },
      strict: {
        label: '严格',
        tagline: '只走规则 · 一步都不许越界',
        desc: '只有命中你预设的「自动交接规则」时才会接力，其余一切主动 @ 全部拦截。智能体不能自由发挥交接对象，必须严格按你配置的来源→目标路径走。流程最可控、最可预测。',
        behaviors: [
          ['yes', '严格按预设交接规则触发'],
          ['no', '禁止规则之外的任何主动 @'],
          ['no', '抑制一切客套与无效发言'],
          ['yes', '流程完全可预测、可审计'],
        ],
        use: '生产环境固定流水线、需要稳定可控的自动化协作时使用。',
      },
    };

    function updateMode(key) {
      const m = MODES[key];
      const behaviors = m.behaviors.map(([t, txt]) =>
        `<div class="mode-behavior ${t}">${t === 'yes' ? ICON_YES : ICON_NO}<span>${txt}</span></div>`
      ).join('');
      document.getElementById('modeDetail').innerHTML = `
        <div class="mode-detail-head">
          <span class="mode-badge ${key}">${m.label}模式</span>
          <span class="mode-tagline">${m.tagline}</span>
        </div>
        <div class="mode-desc">${m.desc}</div>
        <div class="mode-behaviors">${behaviors}</div>
        <div class="mode-use"><strong>适用场景：</strong>${m.use}</div>
      `;
      // 重新触发淡入动画
      const el = document.getElementById('modeDetail');
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }

    // 初始化默认模式
    updateMode('guided');
  </script>
</body>
</html>
