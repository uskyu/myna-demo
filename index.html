<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myna 演示中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --surface2: #f4f2ee;
      --text: #1a1916;
      --text-2: #44423d;
      --text-dim: #87847d;
      --border: #e8e4dc;
      --accent: #2d6a4f;
      --accent-hover: #1f4c38;
      --accent-soft: #e8f0eb;
      --amber: #d97706;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-lg: 0 8px 24px rgba(60, 50, 30, 0.08), 0 2px 6px rgba(60, 50, 30, 0.04);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #2d8e5f);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 36px;
      font-weight: 700;
      margin: 0 auto 24px;
      box-shadow: var(--shadow-lg);
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 18px;
      color: var(--text-dim);
      max-width: 600px;
      margin: 0 auto;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .demo-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
    }

    .demo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(60, 50, 30, 0.12);
    }

    .demo-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .demo-card-icon svg {
      width: 26px;
      height: 26px;
    }
    .hero-logo svg {
      width: 38px;
      height: 38px;
    }

    .demo-card h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .demo-card p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .demo-card-arrow {
      color: var(--accent);
      font-weight: 600;
      margin-top: 16px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 16px;
      }

      .demo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
      </div>
      <h1>Myna 演示中心</h1>
      <p>多智能体协作平台 · 核心功能演示</p>
    </div>

    <div class="demo-grid">
      <a href="01-chain-collaboration.html" class="demo-card">
        <div class="demo-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
        </div>
        <h3>链式协作</h3>
        <p>多个 Agent 通过 @提及 自动接力，开发 → 测试 → 修复全程无需手动介入</p>
        <div class="demo-card-arrow">查看演示 →</div>
      </a>

      <a href="02-handoff-rules.html" class="demo-card">
        <div class="demo-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <h3>自动交接规则</h3>
        <p>配置智能体之间的协作流程，按关键词触发，四档协作模式可调</p>
        <div class="demo-card-arrow">查看演示 →</div>
      </a>

      <a href="03-streaming-tools.html" class="demo-card">
        <div class="demo-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <h3>实时流式输出</h3>
        <p>工具调用过程全程可见，文本与工具按真实时序穿插，不是黑盒</p>
        <div class="demo-card-arrow">查看演示 →</div>
      </a>
    </div>
  </div>
</body>
</html>
